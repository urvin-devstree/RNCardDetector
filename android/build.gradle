buildscript {
  // Only required when opening the android folder stand-alone.
  if (project == rootProject) {
    repositories {
      mavenCentral()
      google()
    }
    dependencies {
      classpath "com.android.tools.build:gradle:8.7.2"
      def kotlin_version = ext.has('kotlinVersion') ? ext.get('kotlinVersion') : '2.0.21'
      classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  compileSdkVersion safeExtGet('compileSdkVersion', 34)

  def agpVersion = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION
  if (agpVersion.tokenize('.')[0].toInteger() >= 7) {
    namespace = "com.reactnativecarddetector"
  }

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 21)
    targetSdkVersion safeExtGet('targetSdkVersion', 34)
    consumerProguardFiles 'consumer-rules.pro'
  }

  lintOptions {
    warning 'InvalidPackage', 'MissingPermission'
  }
}

repositories {
  mavenCentral()
  google()
  maven {
    url "$rootDir/../node_modules/react-native/android"
  }
}

dependencies {
  def kotlin_version = safeExtGet('kotlinVersion', '2.0.21')
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation "com.facebook.react:react-native:${safeExtGet('reactNativeVersion', '+')}"
  implementation "io.github.vlasentiy:lens24:3.0.0"
}

